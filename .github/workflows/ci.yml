name: ZionKing Landing CI/CD

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: 20

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: zionking-landing-dist
          path: dist
          if-no-files-found: error

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    environment: staging

    steps:
      - name: Trigger Netlify staging deploy hook
        env:
          NETLIFY_STAGING_DEPLOY_HOOK_URL: ${{ secrets.NETLIFY_STAGING_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$NETLIFY_STAGING_DEPLOY_HOOK_URL" ]; then
            echo "::notice::NETLIFY_STAGING_DEPLOY_HOOK_URL is not configured. Quality checks passed; skipping deploy hook."
            exit 0
          fi

          curl --fail --show-error --silent --request POST "$NETLIFY_STAGING_DEPLOY_HOOK_URL"

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Trigger Netlify production deploy hook
        env:
          NETLIFY_PRODUCTION_DEPLOY_HOOK_URL: ${{ secrets.NETLIFY_PRODUCTION_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$NETLIFY_PRODUCTION_DEPLOY_HOOK_URL" ]; then
            echo "::notice::NETLIFY_PRODUCTION_DEPLOY_HOOK_URL is not configured. Quality checks passed; skipping deploy hook."
            exit 0
          fi

          curl --fail --show-error --silent --request POST "$NETLIFY_PRODUCTION_DEPLOY_HOOK_URL"
